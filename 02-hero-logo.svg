<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- Geometric pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1f2d40" stroke-width="0.5"/>
    </pattern>
    <pattern id="diamonds" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M60 0 L120 60 60 120 0 60Z" fill="none" stroke="#1f2d40" stroke-width="0.4"/>
    </pattern>
    <!-- Gradient overlay -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1e2a3a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#162030;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:0.6"/>
    </linearGradient>
    <!-- Glow filter for sparkles -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgGrad)"/>

  <!-- Geometric pattern overlay -->
  <rect width="1200" height="600" fill="url(#grid)" opacity="0.6"/>
  <rect width="1200" height="600" fill="url(#diamonds)" opacity="0.3"/>

  <!-- Subtle radial light behind text -->
  <ellipse cx="600" cy="260" rx="400" ry="200" fill="#00b4d8" opacity="0.03"/>
  <ellipse cx="600" cy="260" rx="250" ry="130" fill="#00b4d8" opacity="0.04"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentLine)"/>

  <!-- Decorative horizontal lines -->
  <line x1="300" y1="200" x2="900" y2="200" stroke="url(#accentLine)" stroke-width="0.5" opacity="0.4"/>
  <line x1="250" y1="380" x2="950" y2="380" stroke="url(#accentLine)" stroke-width="0.5" opacity="0.4"/>

  <!-- Subtle house outline (left side) -->
  <g transform="translate(120, 220)" opacity="0.08" stroke="#00b4d8" fill="none" stroke-width="1.5">
    <path d="M0 60 L40 20 80 60 80 110 0 110Z"/>
    <rect x="30" y="70" width="20" height="40"/>
    <line x1="40" y1="0" x2="40" y2="20"/>
  </g>

  <!-- Subtle house outline (right side) -->
  <g transform="translate(1000, 220)" opacity="0.08" stroke="#00b4d8" fill="none" stroke-width="1.5">
    <path d="M0 60 L40 20 80 60 80 110 0 110Z"/>
    <rect x="30" y="70" width="20" height="40"/>
    <line x1="40" y1="0" x2="40" y2="20"/>
  </g>

  <!-- Sparkle / star icons -->
  <!-- 4-point star function via paths -->

  <!-- Sparkle 1 (top left area) -->
  <g transform="translate(200, 150)" filter="url(#glow)" opacity="0.7">
    <path d="M0 -10 L2.5 -2.5 10 0 2.5 2.5 0 10 -2.5 2.5 -10 0 -2.5 -2.5Z" fill="#00b4d8"/>
  </g>

  <!-- Sparkle 2 (top right area) -->
  <g transform="translate(980, 130)" filter="url(#glow)" opacity="0.5">
    <path d="M0 -8 L2 -2 8 0 2 2 0 8 -2 2 -8 0 -2 -2Z" fill="#00b4d8"/>
  </g>

  <!-- Sparkle 3 (left mid) -->
  <g transform="translate(150, 350)" filter="url(#glow)" opacity="0.4">
    <path d="M0 -6 L1.5 -1.5 6 0 1.5 1.5 0 6 -1.5 1.5 -6 0 -1.5 -1.5Z" fill="#00b4d8"/>
  </g>

  <!-- Sparkle 4 (right mid) -->
  <g transform="translate(1050, 310)" filter="url(#glow)" opacity="0.6">
    <path d="M0 -12 L3 -3 12 0 3 3 0 12 -3 3 -12 0 -3 -3Z" fill="#00b4d8"/>
  </g>

  <!-- Sparkle 5 (bottom left) -->
  <g transform="translate(280, 450)" filter="url(#glow)" opacity="0.35">
    <path d="M0 -7 L1.8 -1.8 7 0 1.8 1.8 0 7 -1.8 1.8 -7 0 -1.8 -1.8Z" fill="#00b4d8"/>
  </g>

  <!-- Sparkle 6 (bottom right) -->
  <g transform="translate(920, 470)" filter="url(#glow)" opacity="0.45">
    <path d="M0 -9 L2.2 -2.2 9 0 2.2 2.2 0 9 -2.2 2.2 -9 0 -2.2 -2.2Z" fill="#00b4d8"/>
  </g>

  <!-- Small dot accents -->
  <circle cx="350" cy="180" r="1.5" fill="#00b4d8" opacity="0.3"/>
  <circle cx="850" cy="170" r="1" fill="#00b4d8" opacity="0.25"/>
  <circle cx="450" cy="430" r="1.5" fill="#00b4d8" opacity="0.2"/>
  <circle cx="750" cy="440" r="1" fill="#00b4d8" opacity="0.3"/>
  <circle cx="180" cy="280" r="1" fill="#00b4d8" opacity="0.2"/>
  <circle cx="1020" cy="400" r="1.5" fill="#00b4d8" opacity="0.25"/>

  <!-- Main title: InStyle Cleaning -->
  <text x="600" y="275" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="white" letter-spacing="6">
    InStyle Cleaning
  </text>

  <!-- Decorative underline below title -->
  <line x1="380" y1="300" x2="820" y2="300" stroke="url(#accentLine)" stroke-width="2"/>

  <!-- Small diamond accent at center of underline -->
  <g transform="translate(600, 300)" fill="#00b4d8">
    <path d="M0 -5 L5 0 0 5 -5 0Z"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="345" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#00b4d8" letter-spacing="4" font-weight="300">
    Premium Cleaning Services
  </text>

  <!-- Bullet and location -->
  <text x="600" y="375" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#8899aa" letter-spacing="6" font-weight="300">
    FLORIDA
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="597" width="1200" height="3" fill="url(#accentLine)"/>

  <!-- Corner accents (top-left) -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>

  <!-- Corner accents (top-right) -->
  <line x1="1120" y1="30" x2="1170" y2="30" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
  <line x1="1170" y1="30" x2="1170" y2="80" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>

  <!-- Corner accents (bottom-left) -->
  <line x1="30" y1="570" x2="80" y2="570" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="520" x2="30" y2="570" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>

  <!-- Corner accents (bottom-right) -->
  <line x1="1120" y1="570" x2="1170" y2="570" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
  <line x1="1170" y1="520" x2="1170" y2="570" stroke="#00b4d8" stroke-width="1" opacity="0.4"/>
</svg>